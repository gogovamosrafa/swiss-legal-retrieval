# Swiss Legal Citation Retrieval - Pipeline Configuration

paths:
  data_dir: data/
  indices_dir: indices/
  output_dir: output/
  laws_corpus: data/laws_de.csv
  courts_corpus: data/court_considerations.csv
  train_csv: data/train.csv
  val_csv: data/val.csv
  test_csv: data/test.csv

indexing:
  # court_considerations.csv has 2.47M rows; BM25Okapi stores full tokenized corpus in RAM,
  # causing MemoryError even at 500K rows. Gold citations are 98.8% laws, so skipping
  # court BM25 has minimal impact. Set skip_court_bm25: false to attempt (needs ~16 GB RAM).
  skip_court_bm25: true
  max_court_rows: 500000   # used only when skip_court_bm25: false

retrieval:
  bm25_top_k: 100
  dense_top_k: 100
  rrf_k: 60                          # RRF fusion constant (rank + rrf_k in denominator)
  rrf_bm25_weight: 1.0
  rrf_dense_weight: 1.0

reranking:
  rerank_top_k: 20                   # How many hybrid candidates to send to reranker
  final_threshold: 0.5               # Min rerank score to include in final answer
  rerank_model: claude-sonnet-4-20250514
  max_tokens: 1024
  batch_size: 5                      # Queries per Claude API call (sequential)

dense:
  model_name: intfloat/multilingual-e5-large
  batch_size: 256                    # Sentences per encoding batch (GPU: 256, CPU: 32)
  max_length: 512
  normalize_embeddings: true
  prefix_query: "query: "           # Required prefix for E5 models
  prefix_passage: "passage: "
  laws_only: true                    # court_considerations has 2.47M rows (~10GB FAISS) — BM25 only for courts

evaluation:
  citation_separator: ";"
  metrics:
    - macro_f1
    - micro_f1
    - macro_precision
    - macro_recall
